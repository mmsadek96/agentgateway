version: "3.9"

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: agenttrust
      POSTGRES_PASSWORD: agenttrust
      POSTGRES_DB: agenttrust
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenttrust"]
      interval: 5s
      timeout: 5s
      retries: 10

  station:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3456"
    env_file:
      - .env.docker
    environment:
      DATABASE_URL: postgresql://agenttrust:agenttrust@postgres:5432/agenttrust?schema=public
    command: >
      sh -c "npx prisma migrate deploy && node dist/index.js"

  demo-gateway:
    build: docker/demo-gateway
    depends_on:
      - station
    ports:
      - "3001:3001"
    environment:
      STATION_URL: http://station:3456

volumes:
  pgdata:

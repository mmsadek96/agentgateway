[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "langchain-agenttrust"
version = "0.1.0"
description = "LangChain integration for the AgentTrust protocol — discover gateways, request clearance certificates, and execute trusted actions from LangChain agents."
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"
authors = [
    {name = "AgentTrust Contributors"}
]
keywords = ["langchain", "agenttrust", "ai-agents", "trust", "gateway"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "langchain-core>=0.2.0",
    "httpx>=0.25.0",
    "pydantic>=2.0.0",
]

[project.urls]
Homepage = "https://github.com/anthropics/agenttrust"
Repository = "https://github.com/anthropics/agenttrust"
Documentation = "https://github.com/anthropics/agenttrust#readme"

[tool.setuptools.packages.find]
include = ["langchain_agenttrust*"]

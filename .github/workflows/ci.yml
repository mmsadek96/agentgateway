name: CI — Test, Lint & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  # Allow deploy.yml to call this workflow as a CI gate (#66)
  workflow_call:

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/agenttrust_test"
      JWT_SECRET: "ci-test-jwt-secret-not-real"
      NODE_ENV: test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agenttrust_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push database schema
        run: npx prisma db push --skip-generate

      - name: Run tests
        run: npm test

      - name: Run tests with coverage
        if: matrix.node-version == 20
        run: npm run test:coverage

      - name: Upload coverage report
        if: matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript compile check
        run: npx tsc --noEmit

      - name: Build production
        run: npm run build

      - name: Verify build artifacts
        run: |
          test -d dist || (echo "ERROR: dist/ not found" && exit 1)
          test -f dist/index.js || (echo "ERROR: dist/index.js not found" && exit 1)
          test -d dist/public || (echo "ERROR: dist/public/ not found" && exit 1)
          echo "Build artifacts verified successfully"

  contracts:
    name: Smart Contracts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: contracts/package-lock.json

      - name: Install contract dependencies
        working-directory: contracts
        run: npm ci

      - name: Compile contracts
        working-directory: contracts
        run: npx hardhat compile

      - name: Verify contract artifacts
        working-directory: contracts
        run: |
          test -d artifacts || (echo "ERROR: artifacts/ not found" && exit 1)
          echo "Contract compilation verified"
